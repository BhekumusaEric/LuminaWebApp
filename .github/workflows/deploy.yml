name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lumina-advisory/package-lock.json

      - name: Install dependencies
        working-directory: lumina-advisory
        run: npm ci

      - name: Build static export
        working-directory: lumina-advisory
        env:
          NEXT_PUBLIC_BASE_PATH: /LuminaWebApp
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: lumina-advisory/out
          branch: gh-pages
